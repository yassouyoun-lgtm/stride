<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Get in Touch</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;700&family=Work+Sans:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="contact.css" />
</head>
<body>

  <main class="card">

    <!-- Left panel -->
    <section class="card__panel">
      <span class="eyebrow">— Say hello</span>
      <h1 class="headline">Let's start<br>a conversation.</h1>
      <p class="subtext">Drop a few lines below and we'll get back to you within one business day.</p>

      <ul class="contact-list">
        <li>
          <span class="contact-list__label">Email</span>
          <span class="contact-list__value">hello@studio.com</span>
        </li>
        <li>
          <span class="contact-list__label">Phone</span>
          <span class="contact-list__value">+216 00 000 000</span>
        </li>
        <li>
          <span class="contact-list__label">Studio</span>
          <span class="contact-list__value">Tunis, Tunisia</span>
        </li>
      </ul>

      <div class="panel-mark" aria-hidden="true">
        <svg viewBox="0 0 120 120" fill="none">
          <circle cx="60" cy="60" r="58" stroke="currentColor" stroke-width="2" stroke-dasharray="4 6"/>
          <path d="M40 64 L56 80 L82 44" stroke="currentColor" stroke-width="6" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </div>
    </section>

    <!-- Right panel: form -->
    <section class="card__form">
      <form id="contactForm" novalidate>

        <div class="field">
          <label for="name">Full name</label>
          <input type="text" id="name" name="name" placeholder="Jane Doe" required />
        </div>

        <div class="field-row">
          <div class="field">
            <label for="email">Email</label>
            <input type="email" id="email" name="email" placeholder="jane@email.com" required />
          </div>
          <div class="field">
            <label for="phone">Phone <span class="optional">(optional)</span></label>
            <input type="tel" id="phone" name="phone" placeholder="+216 ..." />
          </div>
        </div>

        <div class="field">
          <label for="subject">Subject</label>
          <select id="subject" name="subject" required>
            <option value="" disabled selected>What's this about?</option>
            <option value="project">New project</option>
            <option value="collab">Collaboration</option>
            <option value="support">Support</option>
            <option value="other">Something else</option>
          </select>
        </div>

        <div class="field">
          <label for="message">Message</label>
          <textarea id="message" name="message" rows="4" placeholder="Tell us a bit about what you need..." required></textarea>
        </div>

        <button type="submit" class="submit-btn">
          <span>Send message</span>
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none">
            <path d="M5 12H19M19 12L13 6M19 12L13 18" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
        </button>

        <p class="form-note" id="formNote" aria-live="polite"></p>
      </form>
    </section>

  </main>

  <script>
    const form = document.getElementById('contactForm');
    const note = document.getElementById('formNote');

    form.addEventListener('submit', function (e) {
      e.preventDefault();
      note.textContent = "Thanks — your message is on its way. We'll reply soon.";
      note.classList.add('form-note--success');
      form.reset();
    });
  </script>

</body>
</html>
