<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Create Your Account</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;700&family=Work+Sans:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="signUp.css" />
</head>
<body>

  <main class="card">

    <!-- Left panel -->
    <section class="card__panel">
      <span class="eyebrow">— Join us</span>
      <h1 class="headline">Create your<br>account.</h1>
      <p class="subtext">Set up your profile in under a minute and start exploring everything the studio has to offer.</p>

      <ul class="perks-list">
        <li>
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none"><path d="M5 12.5L9.5 17L19 7.5" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/></svg>
          <span>Free forever plan</span>
        </li>
        <li>
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none"><path d="M5 12.5L9.5 17L19 7.5" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/></svg>
          <span>No credit card required</span>
        </li>
        <li>
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none"><path d="M5 12.5L9.5 17L19 7.5" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/></svg>
          <span>Cancel anytime</span>
        </li>
      </ul>

      <div class="panel-mark" aria-hidden="true">
        <svg viewBox="0 0 120 120" fill="none">
          <circle cx="60" cy="60" r="58" stroke="currentColor" stroke-width="2" stroke-dasharray="4 6"/>
          <path d="M60 36V84M36 60H84" stroke="currentColor" stroke-width="6" stroke-linecap="round"/>
        </svg>
      </div>
    </section>

    <!-- Right panel: form -->
    <section class="card__form">
      <form id="signupForm" novalidate>

        <div class="field-row">
          <div class="field">
            <label for="firstName">First name</label>
            <input type="text" id="firstName" name="firstName" placeholder="Jane" required />
          </div>
          <div class="field">
            <label for="lastName">Last name</label>
            <input type="text" id="lastName" name="lastName" placeholder="Doe" required />
          </div>
        </div>

        <div class="field">
          <label for="email">Email</label>
          <input type="email" id="email" name="email" placeholder="jane@email.com" required />
        </div>

        <div class="field-row">
          <div class="field">
            <label for="password">Password</label>
            <input type="password" id="password" name="password" placeholder="At least 8 characters" required minlength="8" />
          </div>
          <div class="field">
            <label for="confirmPassword">Confirm password</label>
            <input type="password" id="confirmPassword" name="confirmPassword" placeholder="Repeat password" required minlength="8" />
          </div>
        </div>

        <label class="checkbox">
          <input type="checkbox" id="terms" name="terms" required />
          <span class="checkbox__box" aria-hidden="true"></span>
          <span class="checkbox__text">I agree to the <a href="#">Terms</a> and <a href="#">Privacy Policy</a></span>
        </label>

        <button type="submit" class="submit-btn">
          <span>Create account</span>
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none">
            <path d="M5 12H19M19 12L13 6M19 12L13 18" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
        </button>

        <p class="form-note" id="formNote" aria-live="polite"></p>

        <p class="login-link">Already have an account? <a href="#">Log in</a></p>
      </form>
    </section>

  </main>

  <script>
    const form = document.getElementById('signupForm');
    const note = document.getElementById('formNote');
    const password = document.getElementById('password');
    const confirmPassword = document.getElementById('confirmPassword');

    form.addEventListener('submit', function (e) {
      e.preventDefault();

      if (password.value !== confirmPassword.value) {
        note.textContent = "Passwords don't match — give it another check.";
        note.classList.remove('form-note--success');
        note.classList.add('form-note--error');
        return;
      }

      note.textContent = "Account created — welcome aboard!";
      note.classList.remove('form-note--error');
      note.classList.add('form-note--success');
      form.reset();
    });
  </script>

</body>
</html>
